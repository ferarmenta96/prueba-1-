  <script src="ads.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════
       TOKENS — shared mobile + desktop
    ═══════════════════════════════════════ */
    :root {
      --bg: #ffffff; --surface: #f9f9f9; --surface2: #f2f2f2; --surface3: #eaeaea;
      --border: #dddddd; --border-gold: #C9A84C40;
      --text: #111111; --text-dim: #555555; --muted: #777777; --faint: #aaaaaa;
      --gold: #C9A84C; --gold-bright: #E2C46D; --gold-dim: #8a7035;
      --gold-glow: #C9A84C20; --gold-glow-strong: #C9A84C40;
      --green: #22c55e; --yellow: #f59e0b; --red: #ef4444;
      --accent: var(--gold); --accent-glow: var(--gold-glow);
      --accent-transparent: var(--gold-glow-strong);

      /* Desktop dark theme tokens */
      --dk-bg: #07070a;
      --dk-surface: #0e0e14;
      --dk-surface2: #13131c;
      --dk-surface3: #1a1a26;
      --dk-border: #ffffff0f;
      --dk-border-gold: #C9A84C25;
      --dk-text: #e8e6e0;
      --dk-muted: #6b6878;
      --dk-faint: #3a3848;
    }

    html, body { height: 100%; overflow-x: hidden; }

    /* ═══════════════════════════════════════
       SPLASH
    ═══════════════════════════════════════ */
    #splash {
      position: fixed; inset: 0; background: #ffffff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
    .splash-eye { width: 80px; height: 80px; margin-bottom: 20px; animation: splashPulse 2s ease-in-out infinite; }
    @keyframes splashPulse { 0%,100%{filter:drop-shadow(0 0 8px #C9A84C60)} 50%{filter:drop-shadow(0 0 24px #C9A84C90)} }
    .splash-brand { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:600; letter-spacing:8px; color:var(--gold); text-transform:uppercase; line-height:1; margin-bottom:4px; }
    .splash-tagline { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:48px; }
    .splash-divider { width:1px; height:48px; background:linear-gradient(to bottom,transparent,var(--gold),transparent); margin-bottom:24px; }
    .splash-app-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; letter-spacing:3px; color:#111; text-transform:uppercase; }
    .splash-app-sub { font-family:'Barlow',sans-serif; font-size:12px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
    .splash-loading { position:absolute; bottom:48px; display:flex; flex-direction:column; align-items:center; gap:10px; }
    .splash-bar { width:120px; height:1px; background:var(--faint); border-radius:1px; overflow:hidden; }
    .splash-bar-fill { height:100%; background:var(--gold); animation:splashLoad 1.6s ease forwards; }
    @keyframes splashLoad { 0%{width:0} 60%{width:80%} 100%{width:100%} }
    .splash-loading-text { font-family:'Barlow',sans-serif; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

    /* ═══════════════════════════════════════
       MOBILE LAYOUT (default, ≤ 1023px)
    ═══════════════════════════════════════ */
    body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; overflow-y:auto; }
    #app-mobile { display:block; }
    #app-desktop { display:none; }

    /* ── mobile header ── */
    .m-header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 18px 0; position:relative; z-index:10; flex-shrink:0; }
    .m-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .m-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .m-logo { display:flex; align-items:center; gap:12px; }
    .m-logo-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
    .m-logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:9px; color:var(--muted); letter-spacing:2.5px; text-transform:uppercase; font-weight:600; margin-top:2px; }
    
    /* ── Live badge mejorado con última actualización ── */
    .live-badge { display:flex; align-items:center; gap:5px; background:#4ade8015; border:1px solid #4ade8030; border-radius:20px; padding:5px 10px; font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--green); font-weight:700; letter-spacing:1px; }
    .live-dot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    
    /* ── Metadata header (actualización + confianza) ── */
    .m-header-meta { display:flex; justify-content:space-between; align-items:center; font-family:'Barlow',sans-serif; font-size:10px; color:var(--muted); padding-bottom:10px; }
    .m-meta-item { display:flex; align-items:center; gap:4px; }
    .m-confidence { color:var(--green); font-weight:600; }
    
    .m-tabs { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:12px; }
    .m-tabs::-webkit-scrollbar { display:none; }
    .m-tab { flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; color:var(--text-dim); cursor:pointer; transition:all 0.2s; text-transform:uppercase; white-space:nowrap; }
    .m-tab.active { background:var(--accent-transparent); border-color:var(--accent); color:var(--accent); box-shadow:0 0 16px var(--accent-glow); }

    /* ── mobile traffic card MEJORADA ── */
    .m-traffic-card { background:linear-gradient(135deg,var(--surface2) 0%,var(--surface) 100%); border:1px solid var(--border-gold); border-radius:16px; padding:20px; margin:16px 18px; position:relative; overflow:hidden; }
    .m-traffic-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
    
    .m-traffic-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .m-traffic-title { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
    .m-traffic-time { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:600; line-height:1; color:var(--text); }
    
    /* ── Status badge con sistema de semáforo mejorado ── */
    .m-traffic-status { display:flex; align-items:center; gap:6px; border-radius:20px; padding:8px 14px; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; border:2px solid; }
    .m-status-dot { width:8px; height:8px; border-radius:50%; animation:statusPulse 2s infinite; }
    @keyframes statusPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.2)} }
    
    /* 🟢 FLUIDO */
    .m-status-fluido { color:#059669; background:#10b98115; border-color:#10b981; }
    .m-status-fluido .m-status-dot { background:#10b981; box-shadow:0 0 8px #10b98180; }
    
    /* 🟡 MODERADO */
    .m-status-moderado { color:#d97706; background:#f59e0b15; border-color:#f59e0b; }
    .m-status-moderado .m-status-dot { background:#f59e0b; box-shadow:0 0 8px #f59e0b80; }
    
    /* 🔴 PESADO */
    .m-status-pesado { color:#dc2626; background:#ef444415; border-color:#ef4444; }
    .m-status-pesado .m-status-dot { background:#ef4444; box-shadow:0 0 8px #ef444480; }
    
    .m-traffic-meta { display:flex; gap:16px; font-family:'Barlow',sans-serif; font-size:13px; color:var(--text-dim); margin-top:12px; }

    /* ── Sección de tendencia y mejor hora ── */
    .m-insights { background:var(--surface3); border-radius:12px; padding:14px; margin-top:14px; border:1px solid var(--border); }
    .m-insights-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .m-insights-row:last-child { margin-bottom:0; }
    .m-insights-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; font-weight:600; }
    .m-insights-value { font-family:'Barlow',sans-serif; font-size:13px; color:var(--text); font-weight:600; display:flex; align-items:center; gap:4px; }
    .m-trend-up { color:var(--red); }
    .m-trend-down { color:var(--green); }
    .m-trend-stable { color:var(--yellow); }

    /* ── ANUNCIO PREMIUM (justo después del tiempo) ── */
    .m-ad-premium { margin:16px 18px; border-radius:12px; overflow:hidden; border:1px solid var(--border); background:var(--surface); position:relative; }
    .m-ad-premium::before { content:'SPONSORED'; position:absolute; top:8px; right:8px; font-family:'Barlow Condensed',sans-serif; font-size:9px; letter-spacing:1.5px; color:var(--faint); background:var(--surface2); padding:3px 8px; border-radius:10px; }

    /* ── mobile map ── */
    .m-map-container { margin:0 18px 16px; }
    .m-map-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .m-map-header { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--surface2); }
    .m-map-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
    .m-map { width:100%; height:240px; background:var(--surface2); }
    .m-map-info { padding:12px 16px; font-family:'Barlow',sans-serif; font-size:13px; color:var(--text-dim); background:var(--surface3); }

    /* ── Comparador ordenado automáticamente ── */
    .m-comparison { margin:0 18px 16px; }
    .m-comparison-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; padding-left:4px; }
    .m-comparison-grid { display:flex; flex-direction:column; gap:8px; }
    .m-comp-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:all 0.2s; }
    .m-comp-card:hover { border-color:var(--accent); background:var(--surface2); }
    .m-comp-card.active { border-color:var(--accent); background:var(--accent-transparent); }
    .m-comp-left { display:flex; align-items:center; gap:10px; }
    .m-comp-medal { font-size:18px; }
    .m-comp-name { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1px; color:var(--text); }
    .m-comp-type { font-family:'Barlow',sans-serif; font-size:11px; color:var(--muted); margin-top:2px; }
    .m-comp-time { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--text); }

    /* ── Anuncios inline ── */
    .m-ad-inline { margin:0 18px 16px; }

    /* ── Botón de reporte GAMIFICADO ── */
    .m-report-btn { margin:0 18px 20px; background:linear-gradient(135deg,var(--gold) 0%,var(--gold-bright) 100%); border:none; border-radius:14px; padding:16px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:800; letter-spacing:2px; color:#ffffff; text-transform:uppercase; cursor:pointer; box-shadow:0 4px 16px var(--gold-glow-strong); transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .m-report-btn:active { transform:translateY(1px); box-shadow:0 2px 8px var(--gold-glow-strong); }
    .m-report-benefits { margin:0 18px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; font-family:'Barlow',sans-serif; font-size:11px; color:var(--text-dim); text-align:center; }

    /* ── Explore (negocios locales) ── */
    .m-explore { margin:0 18px 20px; }
    .m-explore-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; padding-left:4px; }
    .m-explore-tabs { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; scrollbar-width:none; }
    .m-explore-tabs::-webkit-scrollbar { display:none; }
    .m-explore-tab { flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:8px 14px; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; transition:all 0.2s; }
    .m-explore-tab.active { background:var(--accent-transparent); border-color:var(--accent); color:var(--accent); }
    .m-explore-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .m-explore-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .m-explore-card:hover { border-color:var(--accent); background:var(--surface2); }
    .m-explore-icon { font-size:28px; margin-bottom:6px; }
    .m-explore-name { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; color:var(--text); margin-bottom:2px; }
    .m-explore-desc { font-family:'Barlow',sans-serif; font-size:10px; color:var(--muted); }

    /* ── Reportes recientes ── */
    .m-reports { margin:0 18px 20px; }
    .m-reports-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; padding-left:4px; }
    .m-report-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
    .m-report-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .m-report-user { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; color:var(--text); }
    .m-report-time { font-family:'Barlow',sans-serif; font-size:11px; color:var(--muted); }
    .m-report-content { font-family:'Barlow',sans-serif; font-size:12px; color:var(--text-dim); line-height:1.4; }
    .m-report-empty { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:32px 20px; text-align:center; }
    .m-report-empty-emoji { font-size:48px; margin-bottom:12px; }
    .m-report-empty-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:1px; color:var(--text); margin-bottom:6px; }
    .m-report-empty-desc { font-family:'Barlow',sans-serif; font-size:13px; color:var(--muted); margin-bottom:16px; }
    .m-report-empty-btn { background:var(--accent-transparent); border:1px solid var(--accent); border-radius:10px; padding:10px 18px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; color:var(--accent); cursor:pointer; display:inline-block; }

    /* ── Footer mejorado con estadísticas ── */
    .m-footer { background:var(--surface2); border-top:1px solid var(--border); padding:20px 18px; position:relative; }
    .m-footer::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
    .m-footer-stats { display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:14px; }
    .m-footer-stat { text-align:center; }
    .m-footer-stat-value { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--accent); }
    .m-footer-stat-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-top:2px; }
    .m-footer-brand { text-align:center; }
    .m-footer-logo { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:600; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:4px; }
    .m-footer-tagline { font-family:'Barlow',sans-serif; font-size:10px; color:var(--muted); letter-spacing:1px; }

    /* ── Install banner ── */
    .m-install { background:linear-gradient(135deg,var(--gold-dim) 0%,var(--gold) 100%); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .m-install-text { flex:1; }
    .m-install-title { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; color:#ffffff; margin-bottom:2px; }
    .m-install-sub { font-family:'Barlow',sans-serif; font-size:11px; color:#ffffffcc; }
    .m-install-btns { display:flex; gap:8px; }
    .m-install-btn { background:#ffffff; border:none; border-radius:8px; padding:8px 14px; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--gold); cursor:pointer; }
    .m-install-dismiss { background:transparent; border:1px solid #ffffff40; color:#ffffff; }

    /* ═══════════════════════════════════════
       DESKTOP LAYOUT (≥ 1024px)
    ═══════════════════════════════════════ */
    @media (min-width: 1024px) {
      #app-mobile { display:none; }
      #app-desktop { display:block; }
      body { background:var(--dk-bg); color:var(--dk-text); }

      .d-container { max-width:1400px; margin:0 auto; padding:24px; }
      
      /* ── desktop header ── */
      .d-header { background:var(--dk-surface); border:1px solid var(--dk-border); border-radius:16px; padding:20px 24px; margin-bottom:24px; position:relative; overflow:hidden; }
      .d-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
      .d-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
      .d-logo { display:flex; align-items:center; gap:16px; }
      .d-logo-title { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:600; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
      .d-logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--dk-muted); letter-spacing:3px; text-transform:uppercase; font-weight:600; margin-top:4px; }
      
      /* ── Header metadata ── */
      .d-header-meta { display:flex; gap:24px; align-items:center; font-family:'Barlow',sans-serif; font-size:12px; color:var(--dk-muted); }
      .d-meta-item { display:flex; align-items:center; gap:6px; }
      .d-confidence { color:var(--green); font-weight:700; }
      
      .d-tabs { display:flex; gap:10px; }
      .d-tab { background:var(--dk-surface2); border:1px solid var(--dk-border); border-radius:12px; padding:12px 18px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1.5px; color:var(--dk-muted); cursor:pointer; transition:all 0.2s; text-transform:uppercase; }

<!-- ═══════════════════════════════════════════════════
     MAIN APP LOGIC
═══════════════════════════════════════════════════ -->
<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
var CONFIG = {
  REFRESH_INTERVAL: 300000,
  FIREBASE_URL: 'https://cruce-rey-default-rtdb.firebaseio.com/reports.json',
  MAP_CENTER: [26.081, -98.298],
  MAP_ZOOM: 15
};

/* ═══════════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════════ */
var BRIDGES = [
  {id:'anzalduas',name:'Anzalduas',type:'Comercial',lat:26.142,lng:-98.320,lanes:['Carril 1','Carril 2','Carril 3'],distance:'1.2 km'},
  {id:'hidalgo',name:'Hidalgo',type:'Comercial/Peatonal',lat:26.100,lng:-98.263,lanes:['Carril 1','Carril 2','Carril 3','Carril 4'],distance:'0.8 km'},
  {id:'pharr',name:'Pharr',type:'Comercial',lat:26.078,lng:-98.188,lanes:['Carril 1','Carril 2'],distance:'1.5 km'},
  {id:'donna',name:'Donna',type:'Comercial',lat:26.161,lng:-98.071,lanes:['Carril 1','Carril 2'],distance:'2.1 km'},
  {id:'progreso',name:'Progreso',type:'Comercial/Peatonal',lat:26.092,lng:-97.957,lanes:['Carril 1','Carril 2','Carril 3'],distance:'1.9 km'}
];

var QUEUE_POSITIONS = ['P1','P2','P3','P4','P5','P6','P7','P8','P9','P10','Más allá'];
var TIME_OPTIONS = ['5 min','10 min','15 min','20 min','30 min','45 min','1 hr','1.5 hr','2 hr','2+ hr'];

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
var state = {
  activeBridge: 0,
  reports: [],
  showForm: false,
  formData: { position:'', lane:'', estimatedTime:'', note:'' },
  submitting: false,
  submitDone: false,
  showInstallBanner: false,
  installPrompt: null,
  lastUpdate: null,
  dailyUsers: Math.floor(Math.random() * (1800 - 1200 + 1)) + 1200 // Número aleatorio entre 1200-1800
};

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function isDesktop() { return window.innerWidth >= 1024; }
function timeAgo(d) {
  var ms = Date.now() - new Date(d).getTime();
  var m = Math.floor(ms/60000);
  if (m < 1) return 'Ahora';
  if (m < 60) return m + ' min';
  var h = Math.floor(m/60);
  if (h < 24) return h + ' hr';
  return Math.floor(h/24) + ' días';
}

function getStatus(time) {
  var m = parseInt(time);
  if (m <= 20) return 'fluido';
  if (m <= 45) return 'moderado';
  return 'pesado';
}

function getStatusText(s) {
  if (s === 'fluido') return 'Fluido';
  if (s === 'moderado') return 'Moderado';
  return 'Pesado';
}

function getTrend() {
  // Simulación de tendencia (podrías calcularla con reportes reales)
  var trends = ['subiendo', 'bajando', 'estable'];
  return trends[Math.floor(Math.random() * trends.length)];
}

function getTrendEmoji(trend) {
  if (trend === 'subiendo') return '📈';
  if (trend === 'bajando') return '📉';
  return '➡️';
}

function getTrendClass(trend) {
  if (trend === 'subiendo') return 'm-trend-up';
  if (trend === 'bajando') return 'm-trend-down';
  return 'm-trend-stable';
}

function getBestTime() {
  // Horas ideales (ejemplo)
  var times = ['6:00 - 8:00 AM', '10:00 - 11:00 AM', '2:00 - 4:00 PM'];
  return times[Math.floor(Math.random() * times.length)];
}

function getConfidence() {
  // Nivel de confianza basado en número de reportes recientes
  var recentReports = state.reports.filter(function(r) {
    return (Date.now() - new Date(r.timestamp).getTime()) < 1800000; // últimos 30 min
  }).length;
  if (recentReports >= 5) return 95;
  if (recentReports >= 3) return 85;
  if (recentReports >= 1) return 70;
  return 60;
}

function getLastUpdateTime() {
  if (!state.lastUpdate) return 'Hace unos momentos';
  return timeAgo(state.lastUpdate);
}

/* ═══════════════════════════════════════════════════════════════
   FIREBASE
═══════════════════════════════════════════════════════════════ */
function fetchReports() {
  fetch(CONFIG.FIREBASE_URL)
    .then(function(r){ return r.json(); })
    .then(function(d){
      state.reports = d ? Object.keys(d).map(function(k){ return Object.assign({id:k}, d[k]); }).reverse() : [];
      state.lastUpdate = new Date().toISOString();
      render();
    })
    .catch(function(){});
}

function submitReport(rep) {
  return fetch(CONFIG.FIREBASE_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(rep)
  });
}

/* ═══════════════════════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════════════════════ */
var mobileMap, desktopMap;

function initMobileMap(b) {
  if (mobileMap) mobileMap.remove();
  mobileMap = L.map('mobileMap', {attributionControl:false,zoomControl:false}).setView([b.lat, b.lng], CONFIG.MAP_ZOOM);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mobileMap);
  L.marker([b.lat, b.lng]).addTo(mobileMap).bindPopup('<b>' + b.name + '</b>').openPopup();
}

function initDesktopMap(b) {
  if (desktopMap) desktopMap.remove();
  desktopMap = L.map('desktopMap', {attributionControl:false,zoomControl:false}).setView([b.lat, b.lng], CONFIG.MAP_ZOOM);

}

/* ═══════════════════════════════════════════════════════════════
   FORMULARIO DE REPORTE
═══════════════════════════════════════════════════════════════ */
function renderForm(b) {
  var f = state.formData;
  if (state.submitDone) {
    return '<div class="modal-overlay"><div class="modal-sheet"><div class="modal-handle"></div>'
      + '<div class="success-screen"><div class="big-emoji">&#x2705;</div>'
      + '<div class="title">Reporte enviado</div><div class="sub">Gracias por ayudar a la comunidad de Reynosa</div>'
      + '</div></div></div>';
  }
  var pBtns = QUEUE_POSITIONS.map(function(p){ return '<button class="option-btn' + (f.position === p ? ' selected' : '') + '" onclick="setField(\'position\',\'' + p + '\')">' + p + '</button>'; }).join('');
  var lBtns = b.lanes.map(function(l){ return '<button class="option-btn' + (f.lane === l ? ' selected' : '') + '" onclick="setField(\'lane\',\'' + l + '\')">' + l + '</button>'; }).join('');
  var tBtns = TIME_OPTIONS.map(function(t){ return '<button class="option-btn' + (f.estimatedTime === t ? ' selected' : '') + '" onclick="setField(\'estimatedTime\',\'' + t + '\')">' + t + '</button>'; }).join('');
  var ok = f.position && f.lane && f.estimatedTime && !state.submitting;
  return '<div class="modal-overlay" onclick="closeFormOuter(event)">'
    + '<div class="modal-sheet" onclick="event.stopPropagation()">'
    + '<div class="modal-handle"></div>'
    + '<div class="modal-title">Reportar Fila</div><div class="modal-sub">' + b.name + ' &middot; ' + b.type + '</div>'
    + '<div class="form-group"><label class="form-label">Hasta donde llega la fila</label><div class="option-grid">' + pBtns + '</div></div>'
    + '<div class="form-group"><label class="form-label">Carril</label><div class="option-grid">' + lBtns + '</div></div>'
    + '<div class="form-group"><label class="form-label">Tiempo estimado</label><div class="option-grid">' + tBtns + '</div></div>'
    + '<div class="form-group"><label class="form-label">Comentario (opcional)</label>'
    + '<textarea class="form-textarea" rows="2" placeholder="Ej: Estan revisando mucho..." oninput="setNote(this.value)">' + f.note + '</textarea></div>'
    + '<button class="submit-btn"' + (ok ? '' : ' disabled') + ' onclick="handleSubmit()">' + (state.submitting ? 'Enviando...' : 'Publicar Reporte') + '</button>'
    + '<button onclick="closeForm()" style="width:100%;background:none;border:none;color:var(--muted);font-size:13px;letter-spacing:1px;margin-top:12px;cursor:pointer;padding:8px;font-family:\'Barlow Condensed\',sans-serif;text-transform:uppercase">Cancelar</button>'
    + '</div></div>';
}

/* ═══════════════════════════════════════════════════════════════
   ACCIONES GLOBALES
═══════════════════════════════════════════════════════════════ */
window.selectBridge = function(i){ state.activeBridge = i; state.showForm = false; render(); };
window.openForm      = function(){ state.showForm = true; state.submitDone = false; state.formData = {position:'',lane:'',estimatedTime:'',note:''}; render(); };
window.closeForm     = function(){ state.showForm = false; render(); };
window.closeFormOuter = function(e){ if (e.target.classList.contains('modal-overlay')) window.closeForm(); };
window.setField      = function(k, v){ state.formData[k] = v; render(); };
window.setNote       = function(v){ state.formData.note = v; };

window.handleSubmit = function() {
  if (!state.formData.position || !state.formData.lane || !state.formData.estimatedTime) return;
  state.submitting = true; render();
  var b      = BRIDGES[state.activeBridge];
  var report = Object.assign({bridge:b.id, bridgeName:b.name}, state.formData, {timestamp: new Date().toISOString()});
  submitReport(report)
    .then(function(){ state.submitDone = true; state.submitting = false; render(); setTimeout(function(){ fetchReports(); window.closeForm(); }, 1500); })
    .catch(function(){ state.submitting = false; state.submitDone = true; render(); setTimeout(window.closeForm, 2000); });
};

window.installApp = function() {
  if (!state.installPrompt) return;
  state.installPrompt.prompt();
  state.installPrompt.userChoice.then(function(r){
    if (r.outcome === 'accepted') state.showInstallBanner = false;
    state.installPrompt = null; render();
  });
};

window.dismissInstall = function() {
  state.showInstallBanner = false;
  try { localStorage.setItem('install-dismissed', '1'); } catch(e) {}
  render();
};

  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/cruce-reynosa/sw.js')
      .then(function(r){ r.update(); }).catch(function(){});
  });
}
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault(); state.installPrompt = e;
  try { if (!localStorage.getItem('install-dismissed')) { state.showInstallBanner = true; render(); } } catch(ex) {}
});

/* ═══════════════════════════════════════════════════════════════
   INICIO
═══════════════════════════════════════════════════════════════ */
// Inyecta CSS de ads y arranca rotación (ambas de ads.js)
injectAdStyles();
startAdRotation();

// Actualizar usuarios diarios cada hora
setInterval(function() {
  state.dailyUsers = Math.floor(Math.random() * (1800 - 1200 + 1)) + 1200;
  render();
}, 3600000); // cada hora

// Splash safety timeout
setTimeout(function(){
  var el = document.getElementById('splash');
  if (!el || el.classList.contains('hidden')) return;
  el.classList.add('hidden');
  setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 650);
}, 3000);

render();
fetchReports();
setInterval(fetchReports, CONFIG.REFRESH_INTERVAL);

})();
</script>
