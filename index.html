  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f9f9f9;
      --surface2: #f2f2f2;
      --surface3: #eaeaea;
      --border: #dddddd;
      --border-gold: #C9A84C40;
      --text: #111111;
      --text-dim: #555555;
      --muted: #777777;
      --faint: #aaaaaa;
      --gold: #C9A84C;
      --gold-bright: #E2C46D;
      --gold-dim: #8a7035;
      --gold-glow: #C9A84C20;
      --gold-glow-strong: #C9A84C40;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --accent: var(--gold);
      --accent-glow: var(--gold-glow);
      --accent-transparent: var(--gold-glow-strong);
      --tab-color: var(--gold);
    }

    html, body { background: #ffffff !important; color: var(--text); font-family: 'Barlow', sans-serif; height: 100%; overflow-x: hidden; overflow-y: auto; }

    #splash { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 0; transition: opacity 0.6s ease, transform 0.6s ease; }
    #splash.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
    .splash-eye { width: 80px; height: 80px; margin-bottom: 20px; animation: splashPulse 2s ease-in-out infinite; }
    @keyframes splashPulse { 0%, 100% { filter: drop-shadow(0 0 8px #C9A84C60); } 50% { filter: drop-shadow(0 0 24px #C9A84C90); } }
    .splash-brand { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 600; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; line-height: 1; margin-bottom: 4px; }
    .splash-tagline { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 48px; }
    .splash-divider { width: 1px; height: 48px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); margin-bottom: 24px; }
    .splash-app-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 3px; color: var(--text); text-transform: uppercase; }
    .splash-app-sub { font-family: 'Barlow', sans-serif; font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }
    .splash-loading { position: absolute; bottom: 48px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .splash-bar { width: 120px; height: 1px; background: var(--faint); border-radius: 1px; overflow: hidden; position: relative; }
    .splash-bar-fill { height: 100%; background: var(--gold); animation: splashLoad 1.6s ease forwards; width: 0; }
    @keyframes splashLoad { 0% { width: 0 } 60% { width: 80% } 100% { width: 100% } }
    .splash-loading-text { font-family: 'Barlow', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    #app { min-height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 18px 0; flex-shrink: 0; position: relative; z-index: 10; }
    .header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-eye { width: 40px; height: 40px; flex-shrink: 0; }
    .logo-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; letter-spacing: 3px; line-height: 1; color: var(--gold); text-transform: uppercase; }
    .logo-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; margin-top: 2px; }
    .live-badge { display: flex; align-items: center; gap: 5px; background: #4ade8015; border: 1px solid #4ade8030; border-radius: 20px; padding: 5px 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--green); font-weight: 700; letter-spacing: 1px; }
    .live-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 12px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; text-transform: uppercase; white-space: nowrap; }
    .tab.active { background: var(--accent-transparent); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
    .tab:hover:not(.active) { background: var(--surface3); border-color: var(--border-gold); }

    .traffic-card { background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%); border: 1px solid var(--border-gold); border-radius: 16px; padding: 20px; margin: 16px 18px; position: relative; overflow: hidden; }
    .traffic-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
    .traffic-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .traffic-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .traffic-time { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 600; line-height: 1; color: var(--text); }
    .traffic-status { display: flex; align-items: center; gap: 6px; background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-fluido { color: var(--green); } .status-fluido .status-dot { background: var(--green); }
    .status-moderado { color: var(--yellow); } .status-moderado .status-dot { background: var(--yellow); }
    .status-pesado { color: var(--red); } .status-pesado .status-dot { background: var(--red); }
    .traffic-meta { display: flex; gap: 16px; font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text-dim); margin-top: 12px; }
    .meta-item { display: flex; align-items: center; gap: 6px; }

    /* -- SMALL AD BANNER -- */
    .ad-banner { border-radius: 12px; margin: 0 18px 16px; overflow: hidden; height: 148px; position: relative; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .ad-banner:hover { transform: translateY(-2px); }
    .ad-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.7s ease; display: flex; align-items: stretch; }
    .ad-slide.active { opacity: 1; }

    /* SLIDE 0: Anunciate */
    .ad-slide-new { background: #ffffff; border: 1px solid #d4bc82; display: flex; align-items: stretch; }
    .ad-slide-new::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #b8922a, #E2C46D, #C9A84C, #b8922a); }
    .ad-slide-new::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #b8922a, #E2C46D, #C9A84C, #b8922a); z-index: 2; }
    .ad-new-left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 12px 0 12px 18px; position: relative; z-index: 2; }
    .ad-new-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; letter-spacing: 3.5px; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
    .ad-new-headline { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 900; line-height: 0.95; text-transform: uppercase; margin-bottom: 6px; letter-spacing: -0.5px; }
    .ad-new-headline .black { color: #0d0d0d; }
    .ad-new-headline .gold  { color: #C9A84C; }
    .ad-new-tagline { font-family: 'Barlow Condensed', sans-serif; font-size: 8.5px; letter-spacing: 2.5px; color: #888; text-transform: uppercase; font-weight: 600; }
    .ad-new-divider { width: 1px; margin: 14px 0; background: linear-gradient(to bottom, transparent, #C9A84C, transparent); flex-shrink: 0; align-self: stretch; }
    .ad-new-right { width: 164px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 10px 14px 14px; gap: 5px; position: relative; z-index: 2; }
    .ad-new-contact-row { display: flex; align-items: center; gap: 6px; }
    .ad-new-icon { font-size: 13px; flex-shrink: 0; line-height: 1; }
    .ad-new-contact-text { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #0d0d0d; letter-spacing: 0.2px; line-height: 1.2; }
    .ad-new-cta { margin-top: 6px; display: inline-block; background: #0d0d0d; color: #ffffff; font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; align-self: stretch; text-align: center; white-space: nowrap; }

    /* Slide 1: Dark gold */
    .ad-slide-0 { background: linear-gradient(135deg, #0d0b08 0%, #1c1508 55%, #0d0b08 100%); border: 1px solid #C9A84C50; }
    .ad-slide-0::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .ad-s0-left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px 0 20px 22px; position: relative; z-index: 2; }
    .ad-s0-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 8px; }
    .ad-s0-brand { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 600; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; line-height: 1; margin-bottom: 8px; }
    .ad-s0-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; }
    .ad-s0-right { width: 110px; display: flex; align-items: center; justify-content: center; opacity: 0.07; }

    /* Slide 2: Cream */
    .ad-slide-1 { background: linear-gradient(135deg, #f5f0e8 0%, #ede5d4 100%); border: 1px solid #d4c4a0; }
    .ad-s1-inner { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 18px 22px; position: relative; overflow: hidden; }
    .ad-s1-deco { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); opacity: 0.07; pointer-events: none; }
    .ad-s1-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 3px; color: #8a7035; text-transform: uppercase; margin-bottom: 6px; }
    .ad-s1-headline { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: #1a1408; line-height: 1.25; margin-bottom: 10px; }
    .ad-s1-row { display: flex; align-items: center; gap: 12px; }
    .ad-pill-dark { display: inline-block; background: #1a1408; color: #C9A84C; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; flex-shrink: 0; }
    .ad-s1-contact { font-family: 'Barlow', sans-serif; font-size: 9px; color: #8a7a5a; letter-spacing: 0.3px; }

    /* Slide 3: Dark blue */
    .ad-slide-2 { background: linear-gradient(135deg, #060a10 0%, #0b1220 55%, #060a10 100%); border: 1px solid #60a5fa30; }
    .ad-slide-2::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #60a5fa70, transparent); }
    .ad-s2-inner { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 18px 22px; }
    .ad-s2-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 3px; color: #60a5fa60; text-transform: uppercase; margin-bottom: 6px; }
    .ad-s2-headline { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: #ddeeff; line-height: 1.25; margin-bottom: 10px; }
    .ad-s2-row { display: flex; align-items: center; gap: 12px; }
    .ad-pill-blue { display: inline-block; background: #60a5fa18; border: 1px solid #60a5fa40; color: #60a5fa; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; flex-shrink: 0; }
    .ad-s2-contact { font-family: 'Barlow', sans-serif; font-size: 9px; color: #60a5fa45; letter-spacing: 0.3px; }

    /* Slide 4: Gold solid */
    .ad-slide-3 { background: linear-gradient(135deg, #C9A84C 0%, #E2C46D 50%, #C9A84C 100%); border: 1px solid #E2C46D; position: relative; overflow: hidden; }
    .ad-slide-3::before { content: 'HORUS'; position: absolute; right: -18px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-family: 'Cormorant Garamond', serif; font-size: 58px; font-weight: 700; letter-spacing: 10px; color: rgba(0,0,0,0.10); pointer-events: none; white-space: nowrap; }
    .ad-s3-inner { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 18px 22px; position: relative; z-index: 2; }
    .ad-s3-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; letter-spacing: 3px; color: #7a5010; text-transform: uppercase; margin-bottom: 6px; }
    .ad-s3-headline { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: #0d0b08; line-height: 1.25; margin-bottom: 10px; }
    .ad-s3-row { display: flex; align-items: center; gap: 12px; }
    .ad-pill-black { display: inline-block; background: #0d0b08; color: #C9A84C; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; flex-shrink: 0; }
    .ad-s3-contact { font-family: 'Barlow', sans-serif; font-size: 9px; color: #7a5010; letter-spacing: 0.3px; }

    /* Slide 5: Kemper Life */
    .ad-slide-4 { background: linear-gradient(135deg, #0a1628 0%, #132040 60%, #0e1b36 100%); border: 1px solid #1e3a6e; display: flex; align-items: stretch; }
    .ad-slide-4::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #c41230, #e8192c, #c41230); }
    .ad-kemper-left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 14px 12px 14px 18px; border-right: 1px solid #1e3a6e; }
    .ad-kemper-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 1px; color: #ffffff; text-transform: uppercase; margin-bottom: 6px; line-height: 1; }
    .ad-kemper-logo span { color: #e8192c; font-weight: 400; font-style: italic; text-transform: none; }
    .ad-kemper-headline { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; color: #ffffff; line-height: 1.2; margin-bottom: 8px; }
    .ad-kemper-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .ad-kemper-tag { border: 1px solid rgba(255,255,255,0.35); border-radius: 2px; padding: 2px 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; color: rgba(255,255,255,0.8); text-transform: uppercase; white-space: nowrap; }
    .ad-kemper-right { width: 148px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 12px 14px; }
    .ad-kemper-agent { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0.3px; color: #f0c040; text-decoration: underline; text-decoration-color: #f0c040; margin-bottom: 1px; }
    .ad-kemper-role { font-family: 'Barlow', sans-serif; font-size: 8px; color: rgba(255,255,255,0.55); margin-bottom: 6px; }
    .ad-kemper-callnow { font-family: 'Barlow Condensed', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 1.5px; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 2px; }
    .ad-kemper-phone { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: #f0c040; line-height: 1; margin-bottom: 2px; letter-spacing: 0.5px; }
    .ad-kemper-altphones { font-family: 'Barlow', sans-serif; font-size: 7.5px; color: rgba(255,255,255,0.5); margin-bottom: 7px; }
    .ad-kemper-divider { height: 1px; background: rgba(255,255,255,0.12); margin-bottom: 6px; }
    .ad-kemper-email { font-family: 'Barlow', sans-serif; font-size: 7.5px; color: rgba(255,255,255,0.5); margin-bottom: 2px; display: flex; align-items: center; gap: 3px; }
    .ad-kemper-address { font-family: 'Barlow', sans-serif; font-size: 7px; color: rgba(255,255,255,0.35); margin-bottom: 6px; line-height: 1.3; }
    .ad-kemper-cta { display: inline-block; background: #e8192c; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; align-self: flex-start; }

    /* Small banner indicators */
    .ad-indicators { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; }
    .ad-dot { width: 5px; height: 5px; border-radius: 50%; transition: all 0.35s ease; }
    .ad-dot.on-dark  { background: rgba(255,255,255,0.25); }
    .ad-dot.on-light { background: rgba(0,0,0,0.20); }
    .ad-dot.active.on-dark  { width: 18px; border-radius: 3px; background: rgba(255,255,255,0.75); }
    .ad-dot.active.on-light { width: 18px; border-radius: 3px; background: rgba(0,0,0,0.45); }

    /* ═══ PREMIUM AD BANNER ═══ */
    .ad-banner-premium { border-radius: 14px; margin: 0 18px 16px; overflow: hidden; height: 210px; position: relative; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 24px rgba(201,168,76,0.18); }
    .ad-banner-premium:hover { transform: translateY(-3px); box-shadow: 0 8px 36px rgba(201,168,76,0.28); }
    .ad-premium-label { position: absolute; top: 10px; right: 10px; z-index: 20; background: linear-gradient(90deg, #b8922a, #E2C46D); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 7px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
    .ad-premium-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; display: flex; align-items: stretch; width: 100%; height: 100%; }

function getCalculatedQueueData(bridge) {
  const serverData = state.serverTraffic[bridge.id];
  const bridgeReports = state.reports.filter(r => r.bridge === bridge.id);
  const sourceLabel = {
    'google':             'Google Maps',
    'horario estimado':   'Horario estimado',
    'horario programado': 'Horario programado',
  };
  let finalTime   = serverData ? serverData.estimatedTime : 5;
  let finalSource = serverData ? (sourceLabel[serverData.source] || serverData.source) : 'Sin datos';
  let finalStatus = serverData ? serverData.status : 'fluido';
  const recentReports = bridgeReports.filter(r => (new Date() - new Date(r.timestamp)) / 60000 < 30).slice(0, 20);
  if (recentReports.length > 0) {
    let sum = 0;
    recentReports.forEach(r => {
      const match = r.estimatedTime.match(/\d+/);
      let mins = match ? parseInt(match[0]) : 0;
      if (r.estimatedTime.includes('hora')) mins *= 60;
      sum += mins;
    });
    const userAvg = sum / recentReports.length;
    finalTime   = Math.round((finalTime * 0.4) + (userAvg * 0.6));
    finalSource = (serverData && serverData.source === 'google') ? 'Google + Comunidad' : 'Comunidad';
    finalStatus = finalTime < 15 ? 'fluido' : (finalTime < 45 ? 'moderado' : 'pesado');
  }
  let startSegment = null;
  if (finalTime > 15 && finalTime <= 30) startSegment = 'P4-P5';
  else if (finalTime > 30 && finalTime <= 50) startSegment = 'P3-P4';
  else if (finalTime > 50) startSegment = 'P2-P3';
  return {
    estimatedTime: finalTime, status: finalStatus, source: finalSource,
    queueLength: (finalTime * 0.04).toFixed(1),
    queueStartSegment: startSegment, isInQueue: finalTime >= 30, reports: bridgeReports
  };
}

function initMap(bridge) {
  const mapContainer = document.getElementById('map');
  if (!mapContainer || typeof L === 'undefined') return;
  if (state.map) { state.map.remove(); state.map = null; }
  const center = bridge.points.P2 || bridge.points.P4;
  state.map = L.map(mapContainer, { zoomControl: false, attributionControl: false }).setView([center.lat, center.lng], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(state.map);
  drawBridgePoints(bridge);
}

function drawBridgePoints(bridge) {
  if (state.mapLayerGroup) state.mapLayerGroup.clearLayers();
  else state.mapLayerGroup = L.layerGroup().addTo(state.map);
  const points = bridge.points;
  const path = [];
  Object.entries(points).forEach(([name, coords]) => {
    path.push([coords.lat, coords.lng]);
    L.circleMarker([coords.lat, coords.lng], {
      radius: 4, fillColor: name === 'P4' ? '#C9A84C' : '#666',
      color: '#fff', weight: 1, fillOpacity: 1
    }).addTo(state.mapLayerGroup);
  });
  L.polyline(path, { color: '#C9A84C', weight: 3, opacity: 0.6 }).addTo(state.mapLayerGroup);
  const queueData = getCalculatedQueueData(bridge);
  if (queueData && queueData.queueStartSegment) highlightQueueStart(queueData.queueStartSegment, points);
}

function highlightQueueStart(segment, points) {
  const [start] = segment.split('-');
  const startPoint = points[start];
  if (!startPoint) return;
  L.circleMarker([startPoint.lat, startPoint.lng], {
    radius: 8, fillColor: '#f87171', color: '#fff',
    weight: 2, fillOpacity: 1, className: 'leaflet-queue-pulse'
  }).addTo(state.mapLayerGroup);
}

async function fetchReports() {
  try {
    const response = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=getReports&t=' + new Date().getTime());
    const data = await response.json();
    state.reports = data.reports || [];
    state.serverTraffic = data.serverTraffic || {};
    render();
    if (state.map) drawBridgePoints(BRIDGES[state.activeBridge]);
  } catch (error) { console.error('Error fetching data:', error); }
}

async function submitReport(report) {

  });
}

function timeAgo(isoString) {
  const diffMins = Math.floor((new Date() - new Date(isoString)) / 60000);
  if (diffMins < 1) return 'Ahora';
  if (diffMins < 60) return diffMins + 'm';
  return Math.floor(diffMins / 60) + 'h';
}

  document.getElementById('app').innerHTML = htmlStr;
  setTimeout(function() { initMap(bridge); }, 100);
  syncAdBanner();
  syncAdBannerPremium();
  attachPremiumBannerClick();
}

function attachPremiumBannerClick() {
  const banner = document.getElementById('adBannerPremium');

  banner.addEventListener('click', function() {
    if (adPremiumIndex === 0) {
      window.open('https://wa.me/' + VISA_WHATSAPP, '_blank');
    }
  });
}

window.selectBridge = function(i) { state.activeBridge = i; state.showForm = false; render(); };
window.openForm     = function() { state.showForm = true; state.submitDone = false; state.formData = { position:’’, lane:’’, estimatedTime:’’, note:’’ }; render(); };
window.closeForm    = function() { state.showForm = false; render(); };
window.closeFormIfOutside = function(e) { if (e.target.classList.contains(‘modal-overlay’)) closeForm(); };
window.setField     = function(key, val) { state.formData[key] = val; render(); };
window.setNote      = function(val) { state.formData.note = val; };

// FIX 2: spread operator - real ASCII three dots (…)
window.handleSubmit = async function() {
if (!state.formData.position || !state.formData.lane || !state.formData.estimatedTime) return;
state.submitting = true; render();
const bridge = BRIDGES[state.activeBridge];
const report = Object.assign(
{ bridge: bridge.id, bridgeName: bridge.name, timestamp: new Date().toISOString() },
state.formData
);
try {
await submitReport(report);
state.submitDone = true; state.submitting = false; render();
setTimeout(async function() { await fetchReports(); closeForm(); }, 1500);
} catch (e) {
state.submitting = false; state.submitDone = true; render();
setTimeout(closeForm, 2000);
}
};

window.installApp = async function() {
if (state.installPrompt) {
state.installPrompt.prompt();
const result = await state.installPrompt.userChoice;
if (result.outcome === ‘accepted’) state.showInstallBanner = false;
state.installPrompt = null; render();
}
};

window.dismissInstall = function() {
state.showInstallBanner = false;
localStorage.setItem(‘install-dismissed’, ‘1’);
render();
};

if (‘serviceWorker’ in navigator) {
window.addEventListener(‘load’, function() {
navigator.serviceWorker.register(’/cruce-reynosa/sw.js’)
.then(function(reg) { reg.update(); }).catch(console.error);
});
}

window.addEventListener(‘beforeinstallprompt’, function(e) {
e.preventDefault();
state.installPrompt = e;
if (!localStorage.getItem(‘install-dismissed’)) { state.showInstallBanner = true; render(); }
});

// – Small banner rotation –
setInterval(function() {
adIndex = (adIndex + 1) % AD_COUNT;
syncAdBanner();
}, 6000);

function syncAdBanner() {
const dotClass = AD_DOT_CLASS[adIndex];
for (let i = 0; i < AD_COUNT; i++) {
const slide = document.getElementById(‘adSlide’ + i);
const dot   = document.getElementById(‘adDot’ + i);
if (slide) slide.classList.toggle(‘active’, i === adIndex);
if (dot) {
dot.className = ‘ad-dot ’ + dotClass + (i === adIndex ? ’ active’ : ‘’);
}
}
}

// – Premium banner rotation –
setInterval(function() {
adPremiumIndex = (adPremiumIndex + 1) % AD_PREMIUM_COUNT;
syncAdBannerPremium();
}, 7000);

function syncAdBannerPremium() {
const dotTheme = AD_PREMIUM_DOT_THEME[adPremiumIndex];
for (let i = 0; i < AD_PREMIUM_COUNT; i++) {
const slide = document.getElementById(‘adPremiumSlide’ + i);
const dot   = document.getElementById(‘adPremiumDot’ + i);
if (slide) slide.classList.toggle(‘active’, i === adPremiumIndex);
if (dot) {
dot.className = ‘ad-premium-dot ’ + dotTheme + (i === adPremiumIndex ? ’ active’ : ‘’);
}
}
}
