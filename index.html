  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════
       TOKENS — shared mobile + desktop
    ═══════════════════════════════════════ */
    :root {
      --bg: #ffffff; --surface: #f9f9f9; --surface2: #f2f2f2; --surface3: #eaeaea;
      --border: #dddddd; --border-gold: #C9A84C40;
      --text: #111111; --text-dim: #555555; --muted: #777777; --faint: #aaaaaa;
      --gold: #C9A84C; --gold-bright: #E2C46D; --gold-dim: #8a7035;
      --gold-glow: #C9A84C20; --gold-glow-strong: #C9A84C40;
      --green: #22c55e; --yellow: #f59e0b; --red: #ef4444;
      --accent: var(--gold); --accent-glow: var(--gold-glow);
      --accent-transparent: var(--gold-glow-strong);

      /* Desktop dark theme tokens */
      --dk-bg: #07070a;
      --dk-surface: #0e0e14;
      --dk-surface2: #13131c;
      --dk-surface3: #1a1a26;
      --dk-border: #ffffff0f;
      --dk-border-gold: #C9A84C25;
      --dk-text: #e8e6e0;
      --dk-muted: #6b6878;
      --dk-faint: #3a3848;
    }

    html, body { height: 100%; overflow-x: hidden; }

    /* ═══════════════════════════════════════
       SPLASH
    ═══════════════════════════════════════ */
    #splash {
      position: fixed; inset: 0; background: #ffffff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
    .splash-eye { width: 80px; height: 80px; margin-bottom: 20px; animation: splashPulse 2s ease-in-out infinite; }
    @keyframes splashPulse { 0%,100%{filter:drop-shadow(0 0 8px #C9A84C60)} 50%{filter:drop-shadow(0 0 24px #C9A84C90)} }
    .splash-brand { font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:600; letter-spacing:8px; color:var(--gold); text-transform:uppercase; line-height:1; margin-bottom:4px; }
    .splash-tagline { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; margin-bottom:48px; }
    .splash-divider { width:1px; height:48px; background:linear-gradient(to bottom,transparent,var(--gold),transparent); margin-bottom:24px; }
    .splash-app-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; letter-spacing:3px; color:#111; text-transform:uppercase; }
    .splash-app-sub { font-family:'Barlow',sans-serif; font-size:12px; color:var(--muted); letter-spacing:1px; margin-top:4px; }
    .splash-loading { position:absolute; bottom:48px; display:flex; flex-direction:column; align-items:center; gap:10px; }
    .splash-bar { width:120px; height:1px; background:var(--faint); border-radius:1px; overflow:hidden; }
    .splash-bar-fill { height:100%; background:var(--gold); animation:splashLoad 1.6s ease forwards; }
    @keyframes splashLoad { 0%{width:0} 60%{width:80%} 100%{width:100%} }
    .splash-loading-text { font-family:'Barlow',sans-serif; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

    /* ═══════════════════════════════════════
       LOADING SPINNER  ← NUEVO
    ═══════════════════════════════════════ */
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen-mobile {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 60vh; gap: 16px;
    }
    .loading-screen-desktop {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; gap: 16px; background: var(--dk-bg);
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 2px solid #C9A84C30;
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════
       MOBILE LAYOUT (default, ≤ 1023px)
    ═══════════════════════════════════════ */
    body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; overflow-y:auto; }
    #app-mobile { display:block; }
    #app-desktop { display:none; }

    /* ── mobile header ── */
    .m-header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 18px 0; position:relative; z-index:10; flex-shrink:0; }
    .m-header::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .m-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .m-logo { display:flex; align-items:center; gap:12px; }
    .m-logo-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; letter-spacing:3px; color:var(--gold); text-transform:uppercase; }
    .m-logo-sub { font-family:'Barlow Condensed',sans-serif; font-size:9px; color:var(--muted); letter-spacing:2.5px; text-transform:uppercase; font-weight:600; margin-top:2px; }
    .live-badge { display:flex; align-items:center; gap:5px; background:#4ade8015; border:1px solid #4ade8030; border-radius:20px; padding:5px 10px; font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--green); font-weight:700; letter-spacing:1px; }
    .live-dot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .m-tabs { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:12px; }
    .m-tabs::-webkit-scrollbar { display:none; }
    .m-tab { flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; color:var(--text-dim); cursor:pointer; transition:all 0.2s; text-transform:uppercase; white-space:nowrap; }
    .m-tab.active { background:var(--accent-transparent); border-color:var(--accent); color:var(--accent); box-shadow:0 0 16px var(--accent-glow); }

    /* ── mobile traffic card ── */
    .m-traffic-card { background:linear-gradient(135deg,var(--surface2) 0%,var(--surface) 100%); border:1px solid var(--border-gold); border-radius:16px; padding:20px; margin:16px 18px; position:relative; overflow:hidden; }
    .m-traffic-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
    .m-traffic-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .m-traffic-title { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
    .m-traffic-time { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:600; line-height:1; color:var(--text); }
    .m-traffic-status { display:flex; align-items:center; gap:6px; background:var(--surface3); border:1px solid var(--border); border-radius:20px; padding:6px 12px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .m-status-dot { width:6px; height:6px; border-radius:50%; }
    .m-status-fluido { color:var(--green); } .m-status-fluido .m-status-dot { background:var(--green); }
    .m-status-moderado { color:var(--yellow); } .m-status-moderado .m-status-dot { background:var(--yellow); }
    .m-status-pesado { color:var(--red); } .m-status-pesado .m-status-dot { background:var(--red); }
    .m-traffic-meta { display:flex; gap:16px; font-family:'Barlow',sans-serif; font-size:13px; color:var(--text-dim); margin-top:12px; }

    /* ── explore quick links ── */
    .m-explore-quick { display:flex; gap:8px; margin:0 18px 14px; }
    .m-explore-quick-btn {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:13px 10px;
      border-radius:10px;
      border:1px solid;
      font-family:'Barlow Condensed',sans-serif;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      text-decoration:none;
      cursor:pointer;
      transition:all 0.2s;
      text-align:center;
      line-height:1.3;
    }
    .m-explore-quick-btn:active { transform:scale(0.97); }
    .m-explore-quick-btn.rns { border-color:#C9A84C40; color:#C9A84C; background:linear-gradient(135deg,#1a0a0010,#0f080008); }
    .m-explore-quick-btn.rns:hover { background:#C9A84C15; border-color:#C9A84C70; }
    .m-explore-quick-btn.rgv { border-color:#60a5fa40; color:#60a5fa; background:linear-gradient(135deg,#00061a10,#00040f08); }
    .m-explore-quick-btn.rgv:hover { background:#60a5fa15; border-color:#60a5fa70; }

    /* ── mobile map ── */
    .m-map-container { background:var(--surface2); border:1px solid var(--border); border-radius:12px; margin:0 18px 16px; overflow:hidden; height:280px; position:relative; z-index:1; }

    /* ── report btn ── */
    .m-report-btn { background:linear-gradient(135deg,var(--accent) 0%,var(--gold-dim) 100%); border:1px solid var(--gold-bright); border-radius:12px; padding:14px 16px; margin:0 18px 14px; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; letter-spacing:2px; color:#fff; text-transform:uppercase; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px var(--gold-glow); width:calc(100% - 36px); display:flex; align-items:center; justify-content:center; gap:8px; }
    .m-report-btn:hover { transform:translateY(-2px); box-shadow:0 6px 24px var(--gold-glow-strong); }
    .m-report-btn-main { font-size:14px; font-weight:800; letter-spacing:2px; }
    .m-report-btn-sub { font-size:10px; font-weight:600; letter-spacing:1px; opacity:0.85; background:rgba(255,255,255,0.15); border-radius:4px; padding:2px 7px; }

    .m-game-btn { display:flex; align-items:center; gap:12px; margin:0 18px 14px; padding:14px 16px; border-radius:12px; border:1px solid #39ff1430; background:linear-gradient(135deg,#0a1a0a 0%,#0d1f0d 100%); text-decoration:none; transition:all 0.2s; }
    .m-game-btn:hover { border-color:#39ff1460; background:linear-gradient(135deg,#0d1f0d 0%,#122012 100%); transform:translateY(-1px); }
    .m-game-btn:active { transform:scale(0.98); }
    .m-game-btn-icon { font-size:22px; flex-shrink:0; }
    .m-game-btn-main { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; letter-spacing:1.5px; color:#39ff14; text-transform:uppercase; }
    .m-game-btn-sub { font-family:'Barlow',sans-serif; font-size:10px; color:#4a7a4a; margin-top:2px; letter-spacing:0.5px; }
    .m-game-btn-arrow { font-size:20px; color:#39ff1460; margin-left:auto; flex-shrink:0; }

    .m-reports-section { flex:1; padding:0 18px 100px; }
    .m-section-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .m-section-title::before,.m-section-title::after { content:''; flex:1; height:1px; }
    .m-section-title::before { background:linear-gradient(to right,transparent,var(--border)); }
    .m-section-title::after { background:linear-gradient(to left,transparent,var(--border)); }
    .m-report-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:12px; }
    .m-report-card:hover { background:var(--surface3); border-color:var(--border-gold); }
    .m-report-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .m-report-position { font-family:'Barlow',sans-serif; font-size:14px; font-weight:600; color:var(--text); }
    .m-report-time-badge { background:var(--surface3); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; color:var(--gold); white-space:nowrap; }
    .m-report-meta { display:flex; gap:12px; font-family:'Barlow',sans-serif; font-size:12px; color:var(--text-dim); margin-bottom:8px; }
    .m-report-note { font-family:'Barlow',sans-serif; font-size:13px; color:var(--muted); font-style:italic; line-height:1.4; padding:8px; background:var(--surface); border-left:2px solid var(--border-gold); border-radius:4px; }

    /* ── empty state ── */
    .m-empty-state { text-align:center; padding:32px 20px 28px; color:var(--muted); }
    .m-empty-emoji { font-size:44px; margin-bottom:10px; }
    .m-empty-cta-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800; letter-spacing:1px; color:#111111; text-transform:uppercase; margin-bottom:4px; }
    .m-empty-cta-sub { font-family:'Barlow',sans-serif; font-size:12px; color:#999999; line-height:1.5; }

    .m-bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); max-width:480px; width:100%; background:var(--surface); border-top:1px solid var(--border); padding:10px 18px; display:flex; justify-content:center; align-items:center; gap:10px; font-family:'Barlow',sans-serif; font-size:11px; color:var(--muted); z-index:100; }

    /* ── contador usuarios ── */
    .m-users-today { display:flex; align-items:center; gap:5px; font-family:'Barlow',sans-serif; font-size:11px; color:var(--faint); }
    .m-users-today-dot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; flex-shrink:0; }
    .m-users-today-num { font-family:'Barlow Condensed',sans-serif; font-weight:700; color:var(--muted); font-size:12px; }

    .m-powered-by { position:fixed; bottom:42px; left:50%; transform:translateX(-50%); max-width:480px; width:100%; display:flex; justify-content:center; align-items:center; gap:6px; padding:8px; z-index:99; }
    .m-powered-text { font-family:'Barlow',sans-serif; font-size:10px; color:var(--faint); letter-spacing:1px; }
    .m-powered-horus { font-family:'Cormorant Garamond',serif; font-size:12px; font-weight:600; letter-spacing:2px; color:var(--gold-dim); }
    .m-bridges-summary { display:flex; gap:8px; margin:0 18px 16px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; }
    .m-bridges-summary::-webkit-scrollbar { display:none; }
    .m-bridge-pill { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 6px 8px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; flex-shrink:0; min-width:68px; }
    .m-bridge-pill::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--pill-color,var(--border)); }
    .m-bridge-pill.active-pill { border-color:var(--pill-color,var(--gold)); background:var(--surface3); box-shadow:0 0 10px var(--pill-glow,transparent); }
    .m-bridge-pill-name { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.5px; color:var(--muted); text-transform:uppercase; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .m-bridge-pill-time { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; line-height:1; color:var(--text); }
    .m-bridge-pill-unit { font-family:'Barlow',sans-serif; font-size:8px; color:var(--muted); margin-top:2px; }
    .m-bridge-pill-dot { width:5px; height:5px; border-radius:50%; margin:4px auto 0; }
    #map-mobile { width:100%; height:100%; background-color:var(--surface2) !important; }
    .leaflet-queue-pulse { animation:mapMarkerPulse 1.5s infinite; transform-origin:center; }
    @keyframes mapMarkerPulse { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }
    .m-queue-indicator { position:absolute; bottom:12px; left:12px; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); border:1px solid var(--border-gold); border-radius:8px; padding:8px 12px; font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:1px; color:var(--gold); text-transform:uppercase; font-weight:700; z-index:1000; }

    /* ── explore section ── */
    .m-explore-section { padding:0 18px 20px; }
    .m-explore-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .m-explore-label::before,.m-explore-label::after { content:''; flex:1; height:1px; }
    .m-explore-label::before { background:linear-gradient(to right,transparent,var(--border)); }
    .m-explore-label::after { background:linear-gradient(to left,transparent,var(--border)); }
    .m-explore-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .m-explore-btn { position:relative; overflow:hidden; border-radius:14px; padding:18px 16px; cursor:pointer; text-decoration:none; display:flex; flex-direction:column; gap:6px; border:1px solid; transition:all 0.25s; }
    .m-explore-btn::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.25s; }
    .m-explore-btn:hover::before { opacity:1; }
    .m-explore-btn:active { transform:scale(0.97); }
    .m-explore-btn.rns { background:linear-gradient(135deg,#1a0a00 0%,#0f0800 100%); border-color:#C9A84C30; }
    .m-explore-btn.rns::before { background:linear-gradient(135deg,#C9A84C15,transparent); }
    .m-explore-btn.rgv { background:linear-gradient(135deg,#00061a 0%,#00040f 100%); border-color:#60a5fa30; }
    .m-explore-btn.rgv::before { background:linear-gradient(135deg,#60a5fa15,transparent); }
    .m-explore-btn-icon { font-size:22px; line-height:1; }
    .m-explore-btn-title { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }
    .m-explore-btn.rns .m-explore-btn-title { color:#C9A84C; }
    .m-explore-btn.rgv .m-explore-btn-title { color:#60a5fa; }
    .m-explore-btn-sub { font-family:'Barlow',sans-serif; font-size:10px; color:#777; line-height:1.3; }
    .m-explore-btn-arrow { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:16px; opacity:0.4; transition:all 0.2s; }
    .m-explore-btn.rns .m-explore-btn-arrow { color:#C9A84C; }
    .m-explore-btn.rgv .m-explore-btn-arrow { color:#60a5fa; }
    .m-explore-btn:hover .m-explore-btn-arrow { opacity:0.9; right:10px; }
    .m-explore-btn-stripe { position:absolute; top:0; left:0; right:0; height:2px; }
    .m-explore-btn.rns .m-explore-btn-stripe { background:linear-gradient(90deg,transparent,#C9A84C,transparent); }

/* ── Contador de usuarios pseudo-real basado en hora ── */
function getDailyUserCount() {
  var now    = new Date();
  var hour   = now.getHours();
  var minute = now.getMinutes();
  var progress = (hour * 60 + minute) / (23 * 60 + 59);
  var minCount = 50;
  var maxCount = 2500;
  var base = Math.round(minCount + (maxCount - minCount) * progress);
  var seed = now.getFullYear() * 100000 + (now.getMonth()+1) * 10000
           + now.getDate() * 100 + now.getHours() * 10 + now.getMinutes();
  var noise = ((seed * 9301 + 49297) % 233280) / 233280;
  var jitter = Math.round((noise - 0.5) * 80);
  return Math.max(minCount, base + jitter);
}

function formatUserCount(n) {
  return n >= 1000 ? (n / 1000).toFixed(1).replace('.0','') + 'k' : String(n);
}

function calcQueue(bridge) {
  var sd    = state.serverTraffic[bridge.id];
  var reps  = state.reports.filter(function(r){ return r.bridge === bridge.id; });
  var labels = {'google':'Google Maps','horario estimado':'Horario estimado','horario programado':'Horario programado'};
  var t      = sd ? sd.estimatedTime : 5;
  var src    = sd ? (labels[sd.source] || sd.source) : 'Sin datos';
  var status = sd ? sd.status : 'fluido';
  var now    = new Date();
  var recent = reps.filter(function(r){ return (now - new Date(r.timestamp)) / 60000 < 30; }).slice(0, 20);
  if (recent.length > 0) {
    var sum = 0;
    recent.forEach(function(r){
      var m    = r.estimatedTime.match(RE_DIGITS);
      var mins = m ? parseInt(m[0], 10) : 0;
      if (r.estimatedTime.indexOf('hora') !== -1) mins *= 60;
      sum += mins;
    });
    t      = Math.round(t * 0.4 + (sum / recent.length) * 0.6);
    src    = (sd && sd.source === 'google') ? 'Google + Comunidad' : 'Comunidad';
    status = t < 15 ? 'fluido' : t < 45 ? 'moderado' : 'pesado';
  }
  var seg = null;
  if (t > 15 && t <= 30) seg = 'P4-P5';
  else if (t > 30 && t <= 50) seg = 'P3-P4';
  else if (t > 50) seg = 'P2-P3';
  return {estimatedTime:t, status:status, source:src, queueLength:(t*0.04).toFixed(1), queueStartSegment:seg, isInQueue:t>=30, reports:reps};
}

function drawMapPoints(bridge, map, layerGroup) {
  if (!map || typeof L === 'undefined') return;
  layerGroup.clearLayers();
  var pts  = bridge.points;
  var path = [];
  Object.keys(pts).forEach(function(n){
    var p = pts[n];
    path.push([p.lat, p.lng]);
    L.circleMarker([p.lat,p.lng], {radius:4, fillColor:n==='P4'?BRIDGE_COLORS[bridge.id]:'#444', color:'#fff', weight:1, fillOpacity:1}).addTo(layerGroup);
  });
  L.polyline(path, {color:BRIDGE_COLORS[bridge.id]||'#C9A84C', weight:3, opacity:0.7}).addTo(layerGroup);
  var q = calcQueue(bridge);
  if (q.queueStartSegment) {
    var s  = q.queueStartSegment.split('-')[0];
    var sp = pts[s];
    if (sp) L.circleMarker([sp.lat,sp.lng], {radius:8, fillColor:'#f87171', color:'#fff', weight:2, fillOpacity:1, className:'leaflet-queue-pulse'}).addTo(layerGroup);
  }
}

function initMobileMap(bridge) {
  var c = document.getElementById('map-mobile');
  if (!c || typeof L === 'undefined') return;
  if (state.mapMobile) { state.mapMobile.remove(); state.mapMobile = null; state.mapMobileLG = null; }
  var ctr = bridge.points.P2 || bridge.points.P4;
  state.mapMobile   = L.map(c, {zoomControl:false, attributionControl:false}).setView([ctr.lat, ctr.lng], 14);

}

function timeAgo(iso) {
  var m = Math.floor((new Date() - new Date(iso)) / 60000);
  if (m < 1) return 'Ahora'; if (m < 60) return m + 'm'; return Math.floor(m / 60) + 'h';
}

    +   '<a class="dk-explore-nav-btn rns" href="/cruce-reynosa/que-hacer-reynosa.html">Qu\u00e9 hacer en Reynosa</a>'
    +   '<a class="dk-explore-nav-btn rgv" href="/cruce-reynosa/que-hacer-rgv.html">Qu\u00e9 hacer en RGV</a>'
    +   '<div class="dk-live-badge"><div class="dk-live-dot"></div>LIVE</div>'
    +   '<button class="dk-report-btn-header" onclick="openForm()">+ Reportar</button>'
    + '</div></div>'

    + '<div class="dk-body">'

    + '<div class="dk-left">'
    +   '<div class="dk-panel-label">Estado Actual</div>'
    +   '<div class="dk-metric-block" style="--accent:' + accentColor + '">'
    +     '<div class="dk-metric-eyebrow">Tiempo de espera &mdash; ' + b.name + '</div>'
    +     '<div class="dk-metric-time" style="color:' + accentColor + '">' + (q.estimatedTime || 0) + '</div>'
    +     '<div class="dk-metric-unit">minutos estimados</div>'
    +     '<div class="dk-status-badge ' + (smap[q.status] || 'fluido') + '"><div class="dk-status-badge-dot"></div>' + (statusT[q.status] || 'Fluido') + '</div>'
    +   '</div>'
    +   '<div class="dk-stats-row">'
    +     '<div class="dk-stat"><div class="dk-stat-label">Km de fila</div><div class="dk-stat-value">' + (q.queueLength || 0) + '</div><div class="dk-stat-sub">kil\u00f3metros</div></div>'
    +     '<div class="dk-stat"><div class="dk-stat-label">Reportes</div><div class="dk-stat-value">' + q.reports.length + '</div><div class="dk-stat-sub">\u00faltimos 30 min</div></div>'
    +   '</div>'
    +   '<div class="dk-source-line"><div class="dk-source-dot"></div>Fuente: ' + (q.source || 'Sin datos') + '</div>'
    +   '<div class="dk-panel-label" style="padding-top:12px">Todos los Puentes</div>'
    +   '<div class="dk-bridges-list">' + bridgeRows + '</div>'
    + '</div>'

    + '<div class="dk-center">'
    +   '<div id="map-desktop"></div>'
    +   '<div class="dk-map-overlay-top">'
    +     '<div class="dk-map-bridge-label"><div class="dk-map-bridge-name" style="color:' + accentColor + '">' + b.name + '</div><div class="dk-map-bridge-sub">' + b.type + ' &mdash; ' + b.lanes.join(', ') + '</div></div>'
    +     (q.queueStartSegment ? '<div class="dk-map-queue-pill">&#x26A0; Fila inicia: ' + q.queueStartSegment + '</div>' : '')
    +   '</div>'
    +   '<div class="dk-map-overlay-bottom"></div>'
    + '</div>'

    + '<div class="dk-right">'
    +   '<div class="dk-ad-premium-wrap" id="adBannerPD">' + premiumBannerHTML('d') + '</div>'
    +   '<div class="dk-ad-small-wrap" id="adBannerD">' + smallBannerHTML() + '</div>'
    +   '<div class="dk-reports-feed">'
    +     '<div class="dk-reports-label">Reportes Recientes <span class="dk-reports-count">' + q.reports.length + '</span></div>'
    +     repItems
    +   '</div>'
    + '</div>'

    + '</div>'

    + '<div class="dk-footer">'
    +   '<div class="dk-footer-left">'
    +     '<span>Auto-refresh 5 min</span>'
    +     '<div class="dk-footer-sep"></div>'
    +     '<span>' + state.reports.length + ' reportes totales</span>'
    +     '<div class="dk-footer-sep"></div>'
    +     '<div class="dk-users-today"><div class="dk-users-today-dot"></div><span>' + formatUserCount(usersToday) + ' usuarios hoy</span></div>'
    +   '</div>'
    +   '<div class="dk-footer-horus">' + eye(14, '#8a7035') + '<span>HORUS</span></div>'
    + '</div>';

  if (state.showForm) html += renderForm(b);

  document.getElementById('app-desktop').innerHTML = html;
  setTimeout(function(){ initDesktopMap(b); }, 100);

  syncSmallBanner();
  syncPremiumBanner('d');
  attachPremiumClick('adBannerPD');
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — Dispatcher
═══════════════════════════════════════════════════════════════ */
function render() {
  if (isDesktop()) {
    renderDesktop();
  } else {
    renderMobile();
  }
}

/* ═══════════════════════════════════════════════════════════════
   FORMULARIO DE REPORTE
═══════════════════════════════════════════════════════════════ */
function renderForm(b) {
  var f = state.formData;
  if (state.submitDone) {
    return '<div class="modal-overlay"><div class="modal-sheet"><div class="modal-handle"></div>'
      + '<div class="success-screen"><div class="big-emoji">&#x2705;</div>'
      + '<div class="title">Reporte enviado</div><div class="sub">Gracias por ayudar a la comunidad de Reynosa</div>'
      + '</div></div></div>';
  }
  var pBtns = QUEUE_POSITIONS.map(function(p){ return '<button class="option-btn' + (f.position === p ? ' selected' : '') + '" onclick="setField(\'position\',\'' + p + '\')">' + p + '</button>'; }).join('');
  var lBtns = b.lanes.map(function(l){ return '<button class="option-btn' + (f.lane === l ? ' selected' : '') + '" onclick="setField(\'lane\',\'' + l + '\')">' + l + '</button>'; }).join('');
  var tBtns = TIME_OPTIONS.map(function(t){ return '<button class="option-btn' + (f.estimatedTime === t ? ' selected' : '') + '" onclick="setField(\'estimatedTime\',\'' + t + '\')">' + t + '</button>'; }).join('');
  var ok = f.position && f.lane && f.estimatedTime && !state.submitting;
  return '<div class="modal-overlay" onclick="closeFormOuter(event)">'
    + '<div class="modal-sheet" onclick="event.stopPropagation()">'
    + '<div class="modal-handle"></div>'
    + '<div class="modal-title">Reportar Fila</div><div class="modal-sub">' + b.name + ' &middot; ' + b.type + '</div>'
    + '<div class="form-group"><label class="form-label">Hasta donde llega la fila</label><div class="option-grid">' + pBtns + '</div></div>'
    + '<div class="form-group"><label class="form-label">Carril</label><div class="option-grid">' + lBtns + '</div></div>'
    + '<div class="form-group"><label class="form-label">Tiempo estimado</label><div class="option-grid">' + tBtns + '</div></div>'
    + '<div class="form-group"><label class="form-label">Comentario (opcional)</label>'
    + '<textarea class="form-textarea" rows="2" placeholder="Ej: Estan revisando mucho..." oninput="setNote(this.value)">' + f.note + '</textarea></div>'
    + '<button class="submit-btn"' + (ok ? '' : ' disabled') + ' onclick="handleSubmit()">' + (state.submitting ? 'Enviando...' : 'Publicar Reporte') + '</button>'
    + '<button onclick="closeForm()" style="width:100%;background:none;border:none;color:var(--muted);font-size:13px;letter-spacing:1px;margin-top:12px;cursor:pointer;padding:8px;font-family:\'Barlow Condensed\',sans-serif;text-transform:uppercase">Cancelar</button>'
    + '</div></div>';
}

/* ═══════════════════════════════════════════════════════════════
   ACCIONES GLOBALES
═══════════════════════════════════════════════════════════════ */
window.selectBridge = function(i){
  state.activeBridge = i;
  state.showForm = false;
  render();
};

window.openForm = function(){
  state.showForm = true;
  state.submitDone = false;
  state.formData = { position:'', lane:'', estimatedTime:'', note:'' };
  render();
};

window.closeForm = function(){
  state.showForm = false;
  render();
};

window.closeFormOuter = function(e){
  if (e.target.classList.contains('modal-overlay')) window.closeForm();
};

window.setField = function(k, v){
  state.formData[k] = v;
  render();
};

window.setNote = function(v){
  state.formData.note = v;
};

window.handleSubmit = function() {
  if (!state.formData.position || !state.formData.lane || !state.formData.estimatedTime) return;

  state.submitting = true;
  render();

  var b = BRIDGES[state.activeBridge];

  var report = Object.assign(
    { bridge: b.id, bridgeName: b.name },
    state.formData,
    { timestamp: new Date().toISOString() }
  );

  submitReport(report)
    .then(function(){
      state.submitDone = true;
      state.submitting = false;
      render();

      setTimeout(function(){
        fetchReports();
        window.closeForm();
      }, 1500);
    })
    .catch(function(){
      state.submitting = false;
      state.submitDone = true;
      render();

      setTimeout(window.closeForm, 2000);
    });
};

window.installApp = function() {
  if (!state.installPrompt) return;

  state.installPrompt.prompt();

  state.installPrompt.userChoice.then(function(r){
    if (r.outcome === 'accepted') state.showInstallBanner = false;
    state.installPrompt = null;
    render();
  });
};

window.dismissInstall = function() {
  state.showInstallBanner = false;

  try {
    localStorage.setItem('install-dismissed', '1');
  } catch(e) {}

  render();
};

/* ── Resize ── */
var _resizeTimer;

window.addEventListener('resize', function(){
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(function(){
    render();
  }, 200);
});

/* ── PWA ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker
      .register('/cruce-reynosa/sw.js')
      .then(function(r){ r.update(); })
      .catch(function(){});
  });
}

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  state.installPrompt = e;

  try {
    if (!localStorage.getItem('install-dismissed')) {
      state.showInstallBanner = true;
      render();
    }
  } catch(ex) {}
});

/* ═══════════════════════════════════════════════════════════════
   INICIO
═══════════════════════════════════════════════════════════════ */
injectAdStyles();
startAdRotation();

/* ── Splash: se esconde cuando lleguen datos O después de 8s máximo ── */
var splashHidden = false;
function hideSplash() {
  if (splashHidden) return;
  splashHidden = true;
  var el = document.getElementById('splash');
  if (!el) return;
  el.classList.add('hidden');
  setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 650);
}

/* Máximo 8 segundos de splash (safety net) */
setTimeout(hideSplash, 8000);

/* render() inicial muestra loading spinner (state.loading = true) */
render();

/* fetchReports apaga loading y re-renderiza con datos reales */
fetchReports();
setInterval(fetchReports, CONFIG.REFRESH_INTERVAL);

})();
</script>

</body>
</html>
