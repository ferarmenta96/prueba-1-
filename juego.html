<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Snake — Cruce Reynosa</title>
  <link rel="icon" type="image/png" href="/cruce-reynosa/public/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Barlow+Condensed:wght@400;600;700;800&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #050d05; }

    /* ── topbar ── */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: #07100a;
      border-bottom: 1px solid #39ff1415;
    }
    #back-btn {
      display: flex; align-items: center; gap: 7px;
      background: none; border: 1px solid #39ff1430; border-radius: 8px;
      padding: 8px 14px; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
      color: #39ff14; text-transform: uppercase; text-decoration: none;
      transition: all 0.2s;
    }
    #back-btn:hover { background: #39ff1410; border-color: #39ff1460; }
    #back-btn:active { transform: scale(0.97); }
    #back-arrow { font-size: 14px; }

    #topbar-brand {
      display: flex; align-items: center; gap: 8px;
    }
    #topbar-eye { width: 26px; height: 26px; flex-shrink: 0; }
    #topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; font-weight: 600; letter-spacing: 3px;
      color: #C9A84C; text-transform: uppercase;
    }
    #topbar-right {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: #39ff14;
      min-width: 60px; text-align: right;
    }

    /* ── main wrap ── */
    #game-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 16px 8px; gap: 10px;
      height: calc(100vh - 53px);
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    /* ── HUD ── */
    #hud {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 340px;
    }
    .hud-block { display: flex; flex-direction: column; gap: 3px; }
    .hud-block.right { align-items: flex-end; }
    .hud-label { font-size: 7px; color: #4a7a4a; letter-spacing: 1px; }
    .hud-val { font-size: 14px; color: #39ff14; }
    .hud-level { font-size: 9px; color: #ffd700; }

    /* ── screen ── */
    #screen-frame {
      border: 3px solid #39ff1440;
      border-radius: 6px;
      padding: 5px;
      background: #0a1a0a;
      box-shadow: 0 0 24px #39ff1410, inset 0 0 20px rgba(0,255,80,0.05);
      position: relative;
    }
    canvas { display: block; image-rendering: pixelated; }

    /* ── overlay ── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: rgba(0,0,0,0.82);
      border-radius: 4px;
    }
    #overlay-title {
      font-size: 16px; color: #39ff14; text-align: center; line-height: 1.8;
      text-shadow: 0 0 12px #39ff1460;
    }
    #overlay-sub { font-size: 8px; color: #4a9a4a; text-align: center; line-height: 2.2; }
    #start-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; padding: 10px 24px;
      background: #39ff14; color: #0a1a0a;
      border: none; border-radius: 4px;
      cursor: pointer; letter-spacing: 1px;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 16px #39ff1460;
    }
    @keyframes blink { 50% { opacity: 0.15; } }
    #start-btn:hover { background: #7cfc00; animation: none; }

    /* ── D-pad ── */
    #dpad {
      display: grid;
      grid-template-columns: 44px 44px 44px;
      grid-template-rows: 44px 44px 44px;
      gap: 4px;
    }
    .dpad-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px; cursor: pointer;
      background: #0d1f0d;
      border: 1px solid #39ff1430;
      border-radius: 6px; color: #39ff14;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      transition: transform 0.08s, background 0.08s;
    }
    .dpad-btn:active { transform: scale(0.9); background: #1a3d1a; }
    .dpad-empty { pointer-events: none; }

    /* ── footer tip ── */
    #footer-tip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #2a4a2a; text-align: center;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <a id="back-btn" href="/cruce-reynosa/">
    <span id="back-arrow">&#8592;</span>
    <span>Ver el puente</span>
  </a>
  <div id="topbar-brand">
    <svg id="topbar-eye" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 60 L160 140 L40 140 Z" fill="none" stroke="#C9A84C" stroke-width="3"/>
      <line x1="70" y1="100" x2="70" y2="140" stroke="#C9A84C" stroke-width="2"/>
      <line x1="100" y1="80" x2="100" y2="140" stroke="#C9A84C" stroke-width="2"/>
      <line x1="130" y1="100" x2="130" y2="140" stroke="#C9A84C" stroke-width="2"/>
      <circle cx="100" cy="90" r="8" fill="#C9A84C"/>
    </svg>
    <div id="topbar-title">Cruce RNS</div>
  </div>
  <div id="topbar-right" id="topbar-score">0</div>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="score-disp">0</div>
    </div>
    <div class="hud-block" style="align-items:center">
      <div class="hud-label">NIVEL</div>
      <div class="hud-level" id="level-disp">1</div>
    </div>
    <div class="hud-block right">
      <div class="hud-label">RÉCORD</div>
      <div class="hud-val" id="hi-disp">0</div>
    </div>
  </div>

  <div id="screen-frame">
    <canvas id="gc"></canvas>
    <div id="overlay">
      <div id="overlay-title">SNAKE</div>
      <div id="overlay-sub">Desliza o usa el D-Pad<br>para mover la serpiente<br><br>Come &#x1F534; para crecer<br>&#x1F7E1; bonus = +50 pts</div>
      <button id="start-btn">&#x25B6; JUGAR</button>
    </div>
  </div>

  <div id="dpad">
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-up">&#x25B2;</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-left">&#x25C4;</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-right">&#x25BA;</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-down">&#x25BC;</button>
    <div class="dpad-empty"></div>
  </div>

  <div id="footer-tip">— Horus System Co. — Cruce Reynosa —</div>
</div>

<script>
(function(){
  /* ── Tamaño responsivo ── */
  var COLS = 20, ROWS = 20;
  var avail = Math.min(window.innerWidth - 32, window.innerHeight - 220, 310);
  var SZ = Math.floor(avail / COLS);
  var W = COLS * SZ, H = ROWS * SZ;

  var canvas = document.getElementById('gc');
  var ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;

  var overlay   = document.getElementById('overlay');
  var overTitle = document.getElementById('overlay-title');
  var overSub   = document.getElementById('overlay-sub');
  var startBtn  = document.getElementById('start-btn');
  var scoreEl   = document.getElementById('score-disp');
  var hiEl      = document.getElementById('hi-disp');
  var levelEl   = document.getElementById('level-disp');
  var topScore  = document.getElementById('topbar-right');

  /* ── Recuperar hi-score guardado ── */
  var hiScore = 0;
  try { hiScore = parseInt(localStorage.getItem('cruce-rns-snake-hi') || '0', 10) || 0; } catch(e){}
  hiEl.textContent = hiScore; topScore.textContent = hiScore;

  var snake, dir, nextDir, food, bonus, score, speed, loop, running = false, level = 1, flash = 0;

  var BG = '#0a1a0a';
  var FOOD_COLOR = '#ff4444';
  var BONUS_COLOR = '#ffd700';
  var SNAKE_HEAD = '#39ff14';
  var SNAKE_BODY = '#2db80e';
  var GRID_COLOR = 'rgba(57,255,20,0.035)';

  function rand(n){ return Math.floor(Math.random() * n); }

  function placeFood(){
    var pos;
    do { pos = { x: rand(COLS), y: rand(ROWS) }; }
    while (snake.some(function(s){ return s.x===pos.x && s.y===pos.y; }));
    food = pos;
  }

  function placeBonus(){
    if (Math.random() < 0.3){
      var pos;
      do { pos = { x: rand(COLS), y: rand(ROWS) }; }
      while (snake.some(function(s){ return s.x===pos.x && s.y===pos.y; }) || (food.x===pos.x && food.y===pos.y));
      bonus = { x: pos.x, y: pos.y, life: 80 };
    } else { bonus = null; }
  }

  function startGame(){
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
    score = 0; level = 1; flash = 0;
    scoreEl.textContent = '0'; levelEl.textContent = '1'; topScore.textContent = '0';
    speed = 160;
    placeFood(); bonus = null;
    overlay.style.display = 'none';
    running = true;
    clearInterval(loop);
    loop = setInterval(tick, speed);
  }

  function setSpeed(){
    clearInterval(loop);
    loop = setInterval(tick, speed);
  }

  function tick(){
    dir = { x: nextDir.x, y: nextDir.y };
    var head = {
      x: (snake[0].x + dir.x + COLS) % COLS,
      y: (snake[0].y + dir.y + ROWS) % ROWS
    };
    if (snake.some(function(s){ return s.x===head.x && s.y===head.y; })){ endGame(); return; }
    snake.unshift(head);

    var ate = false;
    if (head.x === food.x && head.y === food.y){
      score += 10 * level; ate = true; flash = 4;
      placeFood(); placeBonus();
      if (score > 0 && score % 100 === 0){
        level = Math.min(level + 1, 10);
        speed = Math.max(55, 160 - (level - 1) * 12);
        setSpeed();
        levelEl.textContent = level;
      }
    } else if (bonus && head.x === bonus.x && head.y === bonus.y){
      score += 50 * level; ate = true; flash = 7; bonus = null;
    } else {
      snake.pop();
    }

    if (bonus){ bonus.life--; if (bonus.life <= 0) bonus = null; }

    if (score > hiScore){
      hiScore = score;
      hiEl.textContent = hiScore;
      try { localStorage.setItem('cruce-rns-snake-hi', hiScore); } catch(e){}
    }
    scoreEl.textContent = score;
    topScore.textContent = score;
    draw();
  }

  function draw(){
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    /* grid */
    ctx.strokeStyle = GRID_COLOR; ctx.lineWidth = 0.5;
    for (var i = 0; i <= COLS; i++){ ctx.beginPath(); ctx.moveTo(i*SZ,0); ctx.lineTo(i*SZ,H); ctx.stroke(); }
    for (var j = 0; j <= ROWS; j++){ ctx.beginPath(); ctx.moveTo(0,j*SZ); ctx.lineTo(W,j*SZ); ctx.stroke(); }

    /* flash */
    if (flash > 0){ ctx.fillStyle = 'rgba(57,255,20,0.06)'; ctx.fillRect(0,0,W,H); flash--; }

    /* food */
    ctx.fillStyle = FOOD_COLOR;
    ctx.shadowColor = FOOD_COLOR; ctx.shadowBlur = 8;
    ctx.fillRect(food.x*SZ+2, food.y*SZ+2, SZ-4, SZ-4);

    /* bonus */
    if (bonus){
      var alpha = bonus.life > 20 ? 1 : bonus.life / 20;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = BONUS_COLOR;
      ctx.shadowColor = BONUS_COLOR; ctx.shadowBlur = 10;
      ctx.fillRect(bonus.x*SZ+1, bonus.y*SZ+1, SZ-2, SZ-2);
      ctx.globalAlpha = 1;
    }

    ctx.shadowBlur = 0;

    /* snake */
    snake.forEach(function(seg, i){
      if (i === 0){
        ctx.fillStyle = SNAKE_HEAD;
        ctx.shadowColor = SNAKE_HEAD; ctx.shadowBlur = 10;
      } else {
        ctx.globalAlpha = 1 - (i / snake.length) * 0.5;
        ctx.fillStyle = SNAKE_BODY;
        ctx.shadowBlur = 0;
      }
      var g = i === 0 ? 1 : 2;
      ctx.fillRect(seg.x*SZ+g, seg.y*SZ+g, SZ-g*2, SZ-g*2);
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    });

    /* eyes on head */
    if (snake.length > 1){
      ctx.fillStyle = BG;
      var h = snake[0];
      var ex1 = { x: dir.y === 0 ? 1 : 0, y: dir.x === 0 ? 1 : 0 };
      var cx = h.x*SZ + SZ/2, cy = h.y*SZ + SZ/2;
      [[cx + ex1.x*3, cy + ex1.y*3],[cx - ex1.x*3, cy - ex1.y*3]].forEach(function(pt){
        ctx.beginPath(); ctx.arc(pt[0], pt[1], Math.max(1.5, SZ/8), 0, Math.PI*2); ctx.fill();
      });
    }
  }

  function endGame(){
    running = false;
    clearInterval(loop);
    overTitle.textContent = score > 0 && score === hiScore ? '¡RÉCORD!' : 'GAME OVER';
    overSub.innerHTML = 'Puntaje: ' + score + '<br>Nivel: ' + level + '<br>Récord: ' + hiScore + '<br><br>¡Inténtalo de nuevo!';
    startBtn.textContent = '\u25B6 REINICIAR';
    overlay.style.display = 'flex';
  }

  /* ── controles teclado ── */
  document.addEventListener('keydown', function(e){
    if (!running && (e.key === 'Enter' || e.key === ' ')){ startGame(); return; }
    var map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
    var nd = map[e.key];
    if (nd && (nd.x !== -dir.x || nd.y !== -dir.y)){ nextDir = nd; e.preventDefault(); }
  });

  /* ── D-pad ── */
  function go(dx, dy){
    if (!running){ startGame(); return; }
    if (dx !== -dir.x || dy !== -dir.y) nextDir = { x: dx, y: dy };
  }
  document.getElementById('btn-up').addEventListener('click',    function(){ go(0,-1); });
  document.getElementById('btn-down').addEventListener('click',  function(){ go(0,1); });
  document.getElementById('btn-left').addEventListener('click',  function(){ go(-1,0); });
  document.getElementById('btn-right').addEventListener('click', function(){ go(1,0); });

  startBtn.addEventListener('click', startGame);

  /* ── swipe ── */
  var tx = 0, ty = 0;
  canvas.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; ty = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
  canvas.addEventListener('touchend', function(e){
    if (!running){ startGame(); return; }
    var dx = e.changedTouches[0].clientX - tx;
    var dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy)){
      go(dx > 0 ? 1 : -1, 0);
    } else {
      go(0, dy > 0 ? 1 : -1);
    }
    e.preventDefault();
  }, { passive: false });

  /* ── render inicial ── */
  draw();
})();
</script>
</body>
</html>
